---
- name: Install k3s agent
  shell: |
    curl -sfL https://get.k3s.io | K3S_URL=https://{{ hostvars['cp1']['k3s_server_private_ip'] }}:6443 K3S_TOKEN={{ hostvars['cp1']['k3s_token'] }} sh -
  args:
    creates: /usr/local/bin/k3s

- name: Wait for k3s agent to be running
  service:
    name: k3s-agent
    state: started
    enabled: yes
