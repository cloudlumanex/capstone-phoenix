---
- name: Install k3s server
  shell: |
    curl -sfL https://get.k3s.io | INSTALL_K3S_EXEC="--disable traefik --flannel-backend=none --disable-network-policy" sh -
  args:
    creates: /usr/local/bin/k3s

- name: Wait for k3s to be ready
  wait_for:
    path: /etc/rancher/k3s/k3s.yaml
    timeout: 60

- name: Get node token
  slurp:
    src: /var/lib/rancher/k3s/server/node-token
  register: node_token

- name: Set node token fact
  set_fact:
    k3s_token: "{{ node_token.content | b64decode | trim }}"

- name: Get kubeconfig
  fetch:
    src: /etc/rancher/k3s/k3s.yaml
    dest: "{{ playbook_dir }}/kubeconfig"
    flat: yes

- name: Wait for k3s API to be ready
  wait_for:
    host: localhost
    port: 6443
    timeout: 60

- name: Install Calico CNI
  shell: |
    kubectl apply -f https://raw.githubusercontent.com/projectcalico/calico/v3.27.0/manifests/calico.yaml
  environment:
    KUBECONFIG: /etc/rancher/k3s/k3s.yaml
  retries: 3
  delay: 10

- name: Set server private IP fact
  set_fact:
    k3s_server_private_ip: "{{ ansible_default_ipv4.address }}"

- name: Switch Calico to VXLAN backend (AWS-friendly, avoids BGP issues)
  shell: |
    export KUBECONFIG=/etc/rancher/k3s/k3s.yaml
    kubectl patch configmap calico-config -n kube-system --type='merge' -p '{"data":{"calico_backend":"vxlan"}}'
    kubectl patch ippool default-ipv4-ippool --type='merge' -p '{"spec":{"ipipMode":"Never","vxlanMode":"Always"}}'
  retries: 3
  delay: 10

- name: Remove BIRD/BGP checks from calico-node probes (VXLAN mode does not run BIRD)
  shell: |
    export KUBECONFIG=/etc/rancher/k3s/k3s.yaml
    kubectl patch daemonset calico-node -n kube-system --type='json' -p='[
      {"op": "replace", "path": "/spec/template/spec/containers/0/readinessProbe/exec/command", "value": ["/bin/calico-node", "-felix-ready"]},
      {"op": "replace", "path": "/spec/template/spec/containers/0/livenessProbe/exec/command", "value": ["/bin/calico-node", "-felix-live"]}
    ]'
  retries: 3
  delay: 10

- name: Restart calico-node pods to apply VXLAN config
  shell: |
    export KUBECONFIG=/etc/rancher/k3s/k3s.yaml
    kubectl delete pods -n kube-system -l k8s-app=calico-node
  retries: 3
  delay: 10

- name: Wait for Calico pods to be ready
  shell: |
    export KUBECONFIG=/etc/rancher/k3s/k3s.yaml
    kubectl wait --for=condition=ready pod -l k8s-app=calico-node -n kube-system --timeout=120s
